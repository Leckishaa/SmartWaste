<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Edit User</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label" for="student_id">Student ID/Staff ID</label>
            <input type="text" class="form-control" id="student_id" name="student_id" value="{{ user[1] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ user[2] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input type="text" class="form-control" id="password" name="password" value="{{ user[3] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="role">Role</label>
            <select class="form-control" id="role" name="role" required>
                <option value="student" {% if user[4] == 'student' %}selected{% endif %}>Student</option>
                <option value="staff" {% if user[4] == 'staff' %}selected{% endif %}>Staff</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('manage_users') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
