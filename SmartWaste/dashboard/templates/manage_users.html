<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - SmartWaste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div class="container">
    <h1 class="mb-4">👥 Manage Users</h1>

    <div class="mb-3">
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-sm">← Back to Dashboard</a>

    </div>

    <!-- Add User Form -->
<form action="{{ url_for('add_user') }}" method="POST" class="row g-3 border rounded p-3 bg-white mb-4">
    <h5>Add New User</h5>
    <div class="col-md-4">
        <label for="student_id" class="form-label">Student ID/Staff ID</label>
        <input type="text" id="student_id" name="student_id" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" name="name" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label for="password" class="form-label">Password</label>
        <input type="text" id="password" name="password" class="form-control" required>
    </div>
        <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <select class="form-control" name="role" id="role" required>
            <option value="student">Student</option>
            <option value="staff">Staff</option>
        </select>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-success">➕ Add User</button>
    </div>
</form>

    <!-- User Table -->
    <h5>All Users</h5>
    <table class="table table-bordered bg-white">
        <thead>
            <tr>
                <th>ID</th>
                <th>Student ID/Staff ID</th>
                <th>Name</th>
                <th>Password</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
                <td>{{ user[3] }}</td>
                <td>
                    <a href="{{ url_for('edit_user', user_id=user[0]) }}" class="btn btn-warning btn-sm">✏️ Edit</a>
                    <a href="{{ url_for('delete_user', user_id=user[0]) }}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this user?')"> Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
